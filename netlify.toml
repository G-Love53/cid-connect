[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
NODE_VERSION = "20"

# Hashed Vite assets can cache forever; HTML entry must revalidate so deploys don’t
# pair stale index with missing JS (white screen / long hangs after Back).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# SPA: HTML routes only — do not override real files (assets/*.js, etc.)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
