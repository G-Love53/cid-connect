[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
NODE_VERSION = "20"

# Fine-grained Cache-Control lives in public/_headers (copied to dist).
# SPA: HTML routes only — do not override real files (assets/*.js, etc.)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
