name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install
      - name: Build
        env:
          VITE_SUPABASE_URL: https://example.databasepad.com
          VITE_SUPABASE_ANON_KEY: ci-build-placeholder-not-used-at-runtime
        run: npm run build
